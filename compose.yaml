

services:
  website:
    build: ./frontend/webshop
    restart: unless-stopped
    depends_on:
      db: 
        condition: service_healthy
    #  backend:
    #    condition: service_healthy
    ports:
      - "8080:3000"
    

  db:
    image: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secure_password
      MYSQL_DATABASE: webshopdb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: password
    volumes: 
      - ./db_data:/var/lib/mysql 
    ports:
      - 3306:3306
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

      

  backend: 
    image: node
    restart: unless-stopped
    depends_on: 
      db: 
        condition: service_healthy
  #  environment:
  #  healthcheck:
  #    test: []
  #    interval: 30s
  #    timeout: 10s
  #    retries: 3
  #    start_period: 10s

  messagebroker:
    image: rabbitmq:management
    ports:
      - "5672:5672"  # RabbitMQ port med amqp-protokol
      - "15672:15672"  # RabbitMQ management UI
      - "1883:1883"    # MQTT port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin